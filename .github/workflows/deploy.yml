name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  # Lets you manually trigger a redeploy from the Actions tab without
  # needing an empty commit, e.g. if a deploy failed for an unrelated
  # reason (npm registry hiccup, etc.) and you just want to retry.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy should run at a time; if you push again before the
# previous deploy finished, let the new one take over rather than
# queuing (queuing would just mean serving a stale version longer for
# no benefit, since only the latest push's build ever matters).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
